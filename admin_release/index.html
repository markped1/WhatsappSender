<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TomWhatsBulk — Admin Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --card: #111827; --border: #1f2937;
      --green: #25D366; --blue: #3b82f6; --red: #ef4444;
      --yellow: #f59e0b; --text: #f1f5f9; --muted: #64748b;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
    header { background: linear-gradient(135deg,#0d1f12,#0a1628); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    header h1 { font-size: 13px; font-weight: 900; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }
    header .sub { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; }
    .badge { background: #1a2e1a; color: var(--green); font-size: 8px; font-weight: 700; padding: 3px 10px; border-radius: 20px; border: 1px solid #2d4a2d; }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-right: 5px; vertical-align: middle; }
    .conn-dot.ok { background: var(--green); } .conn-dot.err { background: var(--red); }
    .layout { display: flex; gap: 12px; padding: 12px; flex: 1; overflow: hidden; }
    .left { width: 230px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
    .right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .panel-title { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }
    .panel-title::before { content:''; width:3px; height:10px; background:var(--green); border-radius:2px; }
    label { display: block; font-size: 8px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    select { width: 100%; padding: 7px 10px; background: #0d1117; border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 10px; outline: none; margin-bottom: 10px; }
    select:focus { border-color: var(--green); }
    .btn { width: 100%; padding: 8px; border: none; border-radius: 5px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
    .btn-green { background: var(--green); color: #0a0f1e; } .btn-green:hover { background: #1ebe57; }
    .btn-blue { background: #1e3a5f; color: var(--blue); border: 1px solid #2a4a7f; } .btn-blue:hover { background: #2a4a7f; }
    .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .status { font-size: 9px; margin-top: 6px; text-align: center; padding: 4px 8px; border-radius: 4px; min-height: 22px; }
    .status.ok { color: var(--green); background: #0d1f12; } .status.err { color: var(--red); background: #1a0a0a; } .status.info { color: var(--blue); background: #0a1628; }
    .key-result { margin-top: 8px; background: #0d1117; border: 1px solid var(--green); border-radius: 6px; padding: 10px; display: none; }
    .key-display { font-family: monospace; font-size: 12px; font-weight: 900; color: var(--green); letter-spacing: 2px; text-align: center; cursor: pointer; padding: 4px 0; }
    .copy-hint { font-size: 8px; color: var(--muted); text-align: center; margin-top: 3px; }
    .stats { display: flex; gap: 8px; margin-bottom: 10px; flex-shrink: 0; }
    .stat { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px; text-align: center; }
    .stat .num { font-size: 18px; font-weight: 900; } .stat .lbl { font-size: 7px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat.green .num { color: var(--green); } .stat.blue .num { color: var(--blue); } .stat.yellow .num { color: var(--yellow); } .stat.red .num { color: var(--red); }
    .search-bar { width: 100%; padding: 7px 10px; background: #0d1117; border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 10px; outline: none; margin-bottom: 8px; flex-shrink: 0; }
    .search-bar:focus { border-color: var(--green); }
    .table-wrap { flex: 1; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
    .table-wrap::-webkit-scrollbar { width: 4px; } .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    table { width: 100%; border-collapse: collapse; font-size: 9px; }
    th { text-align: left; padding: 7px 10px; font-size: 7px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 1; }
    td { padding: 6px 10px; border-bottom: 1px solid #0f1923; vertical-align: middle; }
    tr:hover td { background: #0d1117; }
    .pill { font-size: 7px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; white-space: nowrap; }
    .pill.unused { background: #0d1f12; color: var(--green); border: 1px solid #1a3a1a; }
    .pill.claimed { background: #0a1628; color: var(--blue); border: 1px solid #1e3a5f; }
    .pill.disabled { background: #1a0a0a; color: var(--red); border: 1px solid #3a1515; }
    .pill.demo { background: #1a1200; color: var(--yellow); border: 1px solid #3a2a00; }
    .pill.expired { background: #1a1a1a; color: #475569; border: 1px solid #2a2a2a; }
    .mono { font-family: monospace; letter-spacing: 1px; font-size: 9px; }
    .action-btn { font-size: 7px; padding: 2px 7px; border-radius: 3px; border: none; cursor: pointer; font-weight: 700; margin-left: 3px; }
    .action-btn.revoke { background: #1a0a0a; color: var(--red); border: 1px solid #3a1515; }
    .action-btn.copy { background: #0d1f12; color: var(--green); border: 1px solid #1a3a1a; }
    .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 10px; }
    .expiry { font-size: 7px; color: var(--yellow); display: block; }
    .type-row { display: flex; gap: 5px; margin-bottom: 10px; }
    .type-btn { flex: 1; padding: 5px 2px; border: 1px solid var(--border); border-radius: 5px; background: transparent; color: var(--muted); font-size: 7px; font-weight: 700; text-transform: uppercase; cursor: pointer; text-align: center; transition: all 0.15s; }
    .type-btn.active { border-color: var(--green); color: var(--green); background: #0d1f12; }
  </style>
</head>
<body>
<header>
  <div><h1>TomWhatsBulk Admin</h1><span class="sub">License Key Management — Firebase</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="connInd" style="font-size:9px;color:var(--muted)"><span class="conn-dot"></span>Connecting...</span>
    <span class="badge">🔐 Admin</span>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="panel">
      <div class="panel-title">Generate Keys</div>
      <div class="type-row">
        <button class="type-btn active" id="tb-full" onclick="setType('full')">Full</button>
        <button class="type-btn" id="tb-demo3" onclick="setType('demo3')">3d</button>
        <button class="type-btn" id="tb-demo7" onclick="setType('demo7')">7d</button>
        <button class="type-btn" id="tb-demo14" onclick="setType('demo14')">14d</button>
        <button class="type-btn" id="tb-demo30" onclick="setType('demo30')">30d</button>
        <button class="type-btn" id="tb-instant" onclick="setType('instant')" style="border-color:#f59e0b;color:#f59e0b">⚡</button>
      </div>
      <label>Quantity</label>
      <select id="qty">
        <option value="1">1 key</option>
        <option value="5">5 keys</option>
        <option value="10" selected>10 keys</option>
        <option value="25">25 keys</option>
      </select>
      <button class="btn btn-green" id="genBtn" onclick="generateKeys()">⚡ Generate</button>
      <div class="status info" id="genStatus">Ready</div>
      <div class="key-result" id="lastResult">
        <div class="key-display" id="keyDisplay" onclick="copyLastKey()"></div>
        <div class="copy-hint" id="copyHint">Click to copy</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Actions</div>
      <button class="btn btn-blue" onclick="loadKeys()">↻ Refresh Keys</button>
    </div>
  </div>

  <div class="right">
    <div class="stats">
      <div class="stat green"><div class="num" id="s-total">—</div><div class="lbl">Total</div></div>
      <div class="stat blue"><div class="num" id="s-avail">—</div><div class="lbl">Available</div></div>
      <div class="stat yellow"><div class="num" id="s-used">—</div><div class="lbl">In Use</div></div>
      <div class="stat red"><div class="num" id="s-rev">—</div><div class="lbl">Revoked</div></div>
    </div>
    <input class="search-bar" id="searchBar" placeholder="🔍 Search keys or machine ID..." oninput="filterKeys()" />
    <div class="table-wrap">
      <table>
        <thead><tr><th>Serial Key</th><th>Type</th><th>Status</th><th>Machine ID</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="keysBody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let allKeys = [], selType = 'full'

  function setType(t) {
    selType = t
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'))
    document.getElementById('tb-' + t).classList.add('active')
  }

  function randomKey() {
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
    const s = () => Array.from({length:5}, () => c[Math.floor(Math.random()*c.length)]).join('')
    return `${s()}-${s()}-${s()}-${s()}`
  }

  async function generateKeys() {
    const qty = parseInt(document.getElementById('qty').value)
    const btn = document.getElementById('genBtn')
    const st = document.getElementById('genStatus')
    btn.disabled = true
    st.className = 'status info'
    st.textContent = `Generating ${qty} key(s)...`

    let expiresAt = null
    if (selType !== 'full' && selType !== 'instant') {
      const days = selType === 'demo3' ? 3 : selType === 'demo7' ? 7 : selType === 'demo14' ? 14 : 30
      expiresAt = new Date(Date.now() + days * 86400000).toISOString()
    }

    let lastKey = '', ok = 0, lastErr = ''
    for (let i = 0; i < qty; i++) {
      const key = randomKey()
      try {
        const res = await window.api.createKey(key, {
          active: true, machine_id: null, claimed_at: null,
          key_type: selType === 'full' ? 'full' : selType === 'instant' ? 'instant' : 'demo',
          expires_at: expiresAt,
          created_at: new Date().toISOString()
        })
        if (res.ok) { ok++; lastKey = key }
        else lastErr = res.error || 'Unknown error'
      } catch(e) { lastErr = e.message }
      st.textContent = `Saving ${i+1}/${qty}...`
    }

    btn.disabled = false
    if (ok > 0) {
      st.className = 'status ok'
      st.textContent = `✓ ${ok} key(s) created`
      document.getElementById('keyDisplay').textContent = lastKey
      document.getElementById('lastResult').style.display = 'block'
      loadKeys()
    } else {
      st.className = 'status err'
      st.textContent = `✗ ${lastErr}`
    }
  }

  async function loadKeys() {
    setConn('loading', 'Connecting...')
    try {
      const keys = await window.api.listKeys()
      allKeys = keys
      setConn('ok', `Connected — ${allKeys.length} keys`)
      renderKeys(allKeys)
    } catch(e) {
      setConn('err', e.message)
      document.getElementById('keysBody').innerHTML = `<tr><td colspan="6" class="empty">⚠ ${e.message}</td></tr>`
    }
  }

  function setConn(state, msg) {
    document.getElementById('connInd').innerHTML =
      `<span class="conn-dot${state==='ok'?' ok':state==='err'?' err':''}"></span>${msg}`
  }

  function renderKeys(keys) {
    const now = Date.now()
    let avail = 0, used = 0, rev = 0
    const rows = keys.map(k => {
      const isExp = k.expires_at && new Date(k.expires_at).getTime() < now
      const isDemo = k.key_type === 'demo'
      let sc, sl
      if (!k.active) { sc='disabled'; sl='Revoked'; rev++ }
      else if (isExp) { sc='expired'; sl='Expired'; rev++ }
      else if (k.machine_id) { sc='claimed'; sl='In Use'; used++ }
      else if (isDemo) { sc='demo'; sl='Demo'; avail++ }
      else { sc='unused'; sl='Available'; avail++ }

      const machine = k.machine_id
        ? `<span class="mono" title="${k.machine_id}" style="color:var(--muted)">${k.machine_id.slice(0,14)}…</span>`
        : '<span style="color:var(--border)">—</span>'
      const created = k.created_at ? new Date(k.created_at).toLocaleDateString() : '—'
      const expiry = k.expires_at ? `<span class="expiry">⏳ ${new Date(k.expires_at).toLocaleDateString()}</span>` : ''
      const typeLabel = isDemo ? `<span class="pill demo">Demo</span>` : `<span style="font-size:7px;color:var(--muted)">Full</span>`
      const actions = `<button class="action-btn copy" onclick="copyKey('${k.id}')">Copy</button>${k.active&&!isExp?` <button class="action-btn revoke" onclick="revokeKey('${k.id}')">Revoke</button>`:''}`
      return `<tr><td class="mono">${k.id}</td><td>${typeLabel}${expiry}</td><td><span class="pill ${sc}">${sl}</span></td><td>${machine}</td><td style="color:var(--muted);font-size:8px">${created}</td><td>${actions}</td></tr>`
    }).join('')

    document.getElementById('keysBody').innerHTML = rows || `<tr><td colspan="6" class="empty">No keys yet — generate some!</td></tr>`
    document.getElementById('s-total').textContent = keys.length
    document.getElementById('s-avail').textContent = avail
    document.getElementById('s-used').textContent = used
    document.getElementById('s-rev').textContent = rev
  }

  function filterKeys() {
    const q = document.getElementById('searchBar').value.toLowerCase()
    renderKeys(allKeys.filter(k => k.id.toLowerCase().includes(q) || (k.machine_id||'').toLowerCase().includes(q)))
  }

  async function revokeKey(key) {
    if (!confirm(`Revoke ${key}?\nThis locks out the user immediately.`)) return
    const res = await window.api.updateKey(key, { active: false })
    if (res.ok) loadKeys()
  }

  function copyKey(key) {
    window.api.copyText(key)
    document.getElementById('genStatus').className = 'status ok'
    document.getElementById('genStatus').textContent = `✓ Copied: ${key}`
    setTimeout(() => { document.getElementById('genStatus').className = 'status info'; document.getElementById('genStatus').textContent = 'Ready' }, 2000)
  }

  function copyLastKey() {
    const key = document.getElementById('keyDisplay').textContent
    window.api.copyText(key)
    document.getElementById('copyHint').textContent = '✓ Copied!'
    setTimeout(() => document.getElementById('copyHint').textContent = 'Click to copy', 2000)
  }

  loadKeys()
</script>
</body>
</html>
